<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة السحب السرية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-login" id="loginBox">
        <h2>الدخول للنظام</h2>
        <input type="password" id="secretKey" placeholder="أدخل الكود السري">
        <button onclick="accessAdmin()" class="draw-btn">فتح اللوحة</button>
    </div>

    <div id="controlPanel" style="display:none; padding: 50px; text-align: center;">
        <h1 class="gold-text">التحكم في البث المباشر</h1>
        <button onclick="launchLiveDraw()" class="draw-btn" style="width: 300px;">فتح شاشة البث (Pop-Out)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
