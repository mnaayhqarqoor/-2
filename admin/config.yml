backend:
  name: git-gateway
  branch: main # تأكد أن هذا هو اسم فرعك في جيت هاب

# هذه الأسطر هي التي كانت تنقصك وحل المشكلة هنا
media_folder: "images" 
public_folder: "/images"

collections:
  - name: "episodes"
    label: "الحلقات"
    folder: "content/episodes"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "اسم المسلسل والحلقة", name: "title", widget: "string" }
      - { label: "رابط المشاهدة", name: "link", widget: "string" }
