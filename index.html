<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة مسلسلات رمضان 2026</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 50px 0;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            margin-bottom: 10px;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* شبكة الحلقات */
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            text-decoration: none;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .watch-label {
            background: var(--primary);
            color: #0f172a;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .status-msg {
            text-align: center;
            margin-top: 100px;
            color: #64748b;
        }

        /* أنيميشن بسيط عند التحميل */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌙 مسلسلات رمضان 2026</h1>
            <p>جميع الحلقات والروابط في مكان واحد</p>
        </header>

        <div id="episodesList" class="episodes-grid">
            <p class="status-msg">جاري تحميل قائمة المسلسلات...</p>
        </div>
    </div>

    <script>
        // دالة لجلب البيانات من ملف data.json
        async function fetchContent() {
            const listContainer = document.getElementById('episodesList');
            try {
                // إضافة متغير عشوائي للرابط لمنع المتصفح من تخزين النسخة القديمة (Cache)
                const response = await fetch('data.json?v=' + Math.random());
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                
                if (data.length === 0) {
                    listContainer.innerHTML = '<p class="status-msg">لا توجد حلقات مضافة حالياً.</p>';
                    return;
                }

                listContainer.innerHTML = ''; // مسح رسالة التحميل
                
                data.forEach(item => {
                    listContainer.innerHTML += `
                        <a href="${item.url}" class="card" target="_blank">
                            <h3>${item.name}</h3>
                            <span class="watch-label">مشاهدة</span>
                        </a>
                    `;
                });

            } catch (error) {
                listContainer.innerHTML = `
                    <p class="status-msg">
                        ⚠️ تأكد من إضافة ملف <b>data.json</b> في GitHub ليعمل الموقع.<br>
                        <small>يجب أن يحتوي الملف على روابط المسلسلات.</small>
                    </p>`;
            }
        }

        // تشغيل الجلب عند فتح الصفحة
        fetchContent();
    </script>
</body>
</html>
