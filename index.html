<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسجل الشاشة الاحترافي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f6f8fa; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; border: 1px solid #d0d7de; border-radius: 8px; padding: 20px; width: 80%; max-width: 800px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 6px; background: #000; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .start-btn { background-color: #2da44e; color: white; }
        .stop-btn { background-color: #cf222e; color: white; }
        button:disabled { background-color: #808080; cursor: not-allowed; }
        #overlay-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d0d7de; border-radius: 6px; box-sizing: border-box; }
        .status { font-size: 0.9em; color: #57606a; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎥 مسجل الشاشة مع إضافة نصوص</h2>
    
    <input type="text" id="overlay-input" placeholder="اكتب ملاحظة أو نصاً ليظهر في التسجيل...">

    <video id="preview" autoplay muted></video>

    <div class="controls">
        <button id="startShare" class="start-btn">1. مشاركة الشاشة</button>
        <button id="startRecord" class="start-btn" disabled>2. بدء التسجيل</button>
        <button id="stopRecord" class="stop-btn" disabled>إيقاف وتحميل</button>
    </div>

    <div class="status" id="statusText">الحالة: جاهز للبدء</div>
</div>

<script>
    let mediaRecorder;
    let recordedChunks = [];
    let screenStream;

    const preview = document.getElementById('preview');
    const startShareBtn = document.getElementById('startShare');
    const startRecordBtn = document.getElementById('startRecord');
    const stopRecordBtn = document.getElementById('stopRecord');
    const statusText = document.getElementById('statusText');

    // 1. وظيفة مشاركة الشاشة
    startShareBtn.onclick = async () => {
        try {
            screenStream = await navigator.mediaDevices.getDisplayMedia({
                video: { cursor: "always" },
                audio: true
            });
            preview.srcObject = screenStream;
            startRecordBtn.disabled = false;
            statusText.innerText = "الحالة: تم مشاركة الشاشة بنجاح";
        } catch (err) {
            console.error("خطأ: " + err);
            statusText.innerText = "الحالة: تم إلغاء المشاركة أو حدث خطأ";
        }
    };

    // 2. وظيفة بدء التسجيل
    startRecordBtn.onclick = () => {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(screenStream, { mimeType: 'video/webm; codecs=vp9' });

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = exportVideo;

        mediaRecorder.start();
        startRecordBtn.disabled = true;
        stopRecordBtn.disabled = false;
        statusText.innerText = "الحالة: جارٍ التسجيل الآن...";
    };

    // 3. وظيفة إيقاف التسجيل
    stopRecordBtn.onclick = () => {
        mediaRecorder.stop();
        startRecordBtn.disabled = false;
        stopRecordBtn.disabled = true;
        statusText.innerText = "الحالة: تم إنهاء التسجيل وجارٍ التحميل";
    };

    // 4. تصدير وتحميل الفيديو
    function exportVideo() {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        document.body.appendChild(a);
        a.style = 'display: none';
        a.href = url;
        a.download = 'screen-recording-' + Date.now() + '.webm';
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
