<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سحب عيد الفطر المليون</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="Logo" class="logo">
        <h1>سجل الآن في سحب الـ $500,000</h1>
        <form id="regForm">
            <input type="text" id="userName" placeholder="الاسم الكامل" required>
            <input type="tel" id="userPhone" placeholder="رقم الهاتف" required>
            <button type="submit" class="btn-gold">دخول السحب</button>
        </form>
    </div>

    <div id="adminPanel" class="hidden">
        <input type="password" id="adminPass" placeholder="الكود السري">
        <button onclick="checkAdmin()">دخول المسؤول</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
