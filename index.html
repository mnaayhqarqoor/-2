<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة رمضان 2026</title>
    <style>
        :root { --main-blue: #38bdf8; --dark-bg: #0f172a; }
        body { 
            background-color: var(--dark-bg); color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px;
        }
        .header { text-align: center; padding: 40px 0; }
        .header h1 { color: var(--main-blue); font-size: 2.5rem; margin: 0; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; max-width: 1100px; margin: 0 auto; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;
            padding: 20px; text-decoration: none; color: white;
            transition: 0.3s; display: flex; justify-content: space-between; align-items: center;
        }
        .card:hover { 
            background: rgba(56, 189, 248, 0.1); border-color: var(--main-blue);
            transform: translateY(-5px);
        }
        .card span { color: var(--main-blue); font-weight: bold; }
        .loading { text-align: center; color: #94a3b8; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌙 مكتبة رمضان 2026</h1>
        <p>دليلك الكامل لجميع الحلقات والروابط</p>
    </div>

    <div id="seriesList" class="grid">
        <p class="loading">جاري جلب قائمة المسلسلات...</p>
    </div>

    <script>
        // جلب البيانات من ملف JSON
        fetch('data.json')
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(data => {
                const list = document.getElementById('seriesList');
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = '<p class="loading">لا توجد مسلسلات مضافة بعد.</p>';
                    return;
                }
                data.forEach(item => {
                    list.innerHTML += `
                        <a href="${item.url}" class="card" target="_blank">
                            <strong>${item.name}</strong>
                            <span>مشاهدة ←</span>
                        </a>
                    `;
                });
            })
            .catch(() => {
                document.getElementById('seriesList').innerHTML = 
                '<p class="loading">يرجى إضافة ملف data.json في المستودع أولاً.</p>';
            });
    </script>
</body>
</html>
