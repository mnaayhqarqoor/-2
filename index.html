<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل المسابقة</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 { color: var(--primary-color); margin-bottom: 20px; }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background-color: #2980b9; }
        
        /* Admin Styles */
        #adminPanel { display: none; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: right;
        }
        th { background-color: var(--primary-color); color: white; }
        .delete-btn {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
        }
        .nav-link {
            display: block;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم المستخدم (التسجيل) -->
        <div id="userSection">
            <h2>📝 التسجيل في المسابقة</h2>
            <input type="text" id="name" placeholder="الاسم الثلاثي">
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="tel" id="phone" placeholder="رقم الهاتف">
            <button onclick="registerUser()">تسجيل الآن</button>
            
            <span class="nav-link" onclick="showAdminLogin()">الدخول كمسؤول (Admin)</span>
        </div>

        <!-- قسم تسجيل دخول الأدمن -->
        <div id="loginSection" style="display: none;">
            <h2>🔐 دخول المشرف</h2>
            <input type="password" id="adminPass" placeholder="أدخل الكود السري">
            <button onclick="checkAdmin()">دخول</button>
            <span class="nav-link" onclick="showUserSection()">عودة للتسجيل</span>
        </div>

        <!-- لوحة التحكم (الأدمن) -->
        <div id="adminPanel">
            <h2>📊 لوحة التحكم - المشاركين</h2>
            <p>عدد المسجلين: <span id="count">0</span></p>
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الهاتف</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <!-- سيتم إضافة البيانات هنا -->
                </tbody>
            </table>
            <button onclick="logout()" style="background-color: #7f8c8d; margin-top: 20px;">تسجيل خروج</button>
            <button onclick="clearAllData()" style="background-color: #c0392b; margin-top: 10px;">حذف جميع البيانات</button>
        </div>
    </div>

    <script>
        // دالة لإظهار واجهة المستخدم
        function showUserSection() {
            document.getElementById('userSection').style.display = 'block';
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
        }

        // دالة لإظهار واجهة تسجيل الدخول
        function showAdminLogin() {
            document.getElementById('userSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
        }

        // دالة التحقق من الكود السري
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === "1122") {
                loadAdminPanel();
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminPass').value = ''; // مسح الحقل
            } else {
                alert("الكود السري غير صحيح!");
            }
        }

        // دالة تسجيل مستخدم جديد
        function registerUser() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            if (name === "" || phone === "") {
                alert("يرجى ملء الاسم ورقم الهاتف");
                return;
            }

            const user = { name, email, phone, date: new Date().toLocaleString() };
            
            // جلب البيانات القديمة وإضافة الجديد
            let users = JSON.parse(localStorage.getItem('contestUsers')) || [];
            users.push(user);
            
            // حفظ البيانات في المتصفح
            localStorage.setItem('contestUsers', JSON.stringify(users));

            alert("تم التسجيل بنجاح!");
            // تفريغ الحقول
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('phone').value = '';
        }

        // دالة تحميل لوحة التحكم وعرض البيانات
        function loadAdminPanel() {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '';
            
            let users = JSON.parse(localStorage.getItem('contestUsers')) || [];
            document.getElementById('count').innerText = users.length;

            users.forEach((user, index) => {
                let row = `<tr>
                    <td>${user.name}<br><small>${user.email}</small></td>
                    <td>${user.phone}</td>
                    <td><button class="delete-btn" onclick="deleteUser(${index})">حذف</button></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        // دالة حذف مستخدم واحد
        function deleteUser(index) {
            let users = JSON.parse(localStorage.getItem('contestUsers')) || [];
            users.splice(index, 1);
            localStorage.setItem('contestUsers', JSON.stringify(users));
            loadAdminPanel(); // تحديث الجدول
        }

        // دالة حذف كل البيانات
        function clearAllData() {
            if(confirm("هل أنت متأكد من حذف جميع المسجلين؟ لا يمكن التراجع.")) {
                localStorage.removeItem('contestUsers');
                loadAdminPanel();
            }
        }

        // دالة تسجيل الخروج
        function logout() {
            showUserSection();
        }
    </script>
</body>
</html>
