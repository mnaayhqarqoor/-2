<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسلسلات رمضان 2026</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px; width: 100%; max-width: 600px; text-align: center;
        }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        .links-list { display: grid; gap: 10px; margin-top: 20px; }
        .ep-link {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid #38bdf8;
            padding: 15px; border-radius: 12px;
            color: #38bdf8; text-decoration: none; font-weight: bold;
            transition: 0.3s;
        }
        .ep-link:hover { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 حلقات رمضان 2026</h1>
        <div id="linksContainer" class="links-list">جاري تحميل الحلقات...</div>
    </div>

    <script>
        // كود بسيط جداً يقرأ الروابط من ملف نصي
        fetch('links.txt')
            .then(response => response.text())
            .then(text => {
                const lines = text.split('\n');
                const container = document.getElementById('linksContainer');
                container.innerHTML = '';
                lines.forEach((line, index) => {
                    if(line.trim() !== "") {
                        const link = document.createElement('a');
                        link.href = line.trim();
                        link.target = "_blank";
                        link.className = "ep-link";
                        link.innerText = `مشاهدة الحلقة ${index + 1}`;
                        container.appendChild(link);
                    }
                });
            })
            .catch(() => document.getElementById('linksContainer').innerText = "أضف روابط في ملف links.txt أولاً!");
    </script>
</body>
</html>
