<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة أوجد اللون المختلف</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary-color: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #game-grid {
            display: grid;
            gap: 10px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 400px;
        }

        .color-box {
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .color-box:hover {
            transform: scale(0.98);
        }

        .color-box:active {
            transform: scale(0.95);
        }

        .message-box {
            position: fixed;
            top: 20px;
            padding: 15px 30px;
            border-radius: 50px;
            background: #333;
            color: white;
            display: none;
            animation: fadeInOut 2s forwards;
            z-index: 100;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #357abd;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="toast" class="message-box"></div>

    <div class="container">
        <h1>أوجد اللون المختلف</h1>
        <p>اضغط على المربع الذي يحمل درجة لون مختلفة قليلاً!</p>
        
        <div class="stats">
            <div>المستوى: <span id="level">1</span></div>
            <div>النقاط: <span id="score">0</span></div>
            <div>الوقت: <span id="timer">15</span></div>
        </div>

        <div id="game-grid"></div>
    </div>

    <!-- واجهة نهاية اللعبة -->
    <div id="game-over" class="game-over-overlay">
        <h2>انتهى الوقت!</h2>
        <p style="font-size: 1.5rem;">نقاطك النهائية: <span id="final-score">0</span></p>
        <p>أعلى مستوى وصلت له: <span id="final-level">1</span></p>
        <button class="btn" onclick="resetGame()">العب مرة أخرى</button>
    </div>

    <script>
        let score = 0;
        let level = 1;
        let timeLeft = 15;
        let timerInterval;
        let gridSize = 2; // البداية بـ 2x2

        const gridElement = document.getElementById('game-grid');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const timerElement = document.getElementById('timer');
        const gameOverOverlay = document.getElementById('game-over');
        const toast = document.getElementById('toast');

        function showToast(message) {
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function generateColor() {
            const r = Math.floor(Math.random() * 200);
            const g = Math.floor(Math.random() * 200);
            const b = Math.floor(Math.random() * 200);
            
            // تحديد "الصعوبة": كلما زاد المستوى، قل الفارق اللوني
            // الفارق يبدأ بـ 40 وينقص تدريجياً حتى يصل لـ 5 كحد أدنى
            const diff = Math.max(5, 40 - Math.floor(level / 2));
            
            const baseColor = `rgb(${r}, ${g}, ${b})`;
            const oddColor = `rgb(${r + diff}, ${g + diff}, ${b + diff})`;
            
            return { baseColor, oddColor };
        }

        function createGrid() {
            gridElement.innerHTML = '';
            
            // تحديد حجم الشبكة بناءً على المستوى
            // 1-2: 2x2 | 3-5: 3x3 | 6-9: 4x4 | 10+: 5x5 وما فوق
            if (level <= 2) gridSize = 2;
            else if (level <= 5) gridSize = 3;
            else if (level <= 9) gridSize = 4;
            else if (level <= 14) gridSize = 5;
            else if (level <= 20) gridSize = 6;
            else gridSize = 8;

            gridElement.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            const totalBoxes = gridSize * gridSize;
            const oddIndex = Math.floor(Math.random() * totalBoxes);
            const colors = generateColor();

            for (let i = 0; i < totalBoxes; i++) {
                const box = document.createElement('div');
                box.classList.add('color-box');
                
                if (i === oddIndex) {
                    box.style.backgroundColor = colors.oddColor;
                    box.onclick = handleCorrectClick;
                } else {
                    box.style.backgroundColor = colors.baseColor;
                    box.onclick = handleWrongClick;
                }
                
                gridElement.appendChild(box);
            }
        }

        function handleCorrectClick() {
            score += 10;
            level += 1;
            timeLeft += 2; // مكافأة وقت عند الإجابة الصحيحة
            if (timeLeft > 15) timeLeft = 15; // حد أقصى للوقت
            
            updateStats();
            createGrid();
        }

        function handleWrongClick() {
            timeLeft -= 3; // عقوبة وقت عند الإجابة الخاطئة
            updateStats();
            
            // تأثير بصري للخطأ
            gridElement.style.transform = 'translateX(10px)';
            setTimeout(() => gridElement.style.transform = 'translateX(-10px)', 50);
            setTimeout(() => gridElement.style.transform = 'translateX(0)', 100);
        }

        function updateStats() {
            scoreElement.textContent = score;
            levelElement.textContent = level;
            timerElement.textContent = timeLeft;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-level').textContent = level;
            gameOverOverlay.style.display = 'flex';
        }

        function resetGame() {
            score = 0;
            level = 1;
            timeLeft = 15;
            gridSize = 2;
            gameOverOverlay.style.display = 'none';
            updateStats();
            createGrid();
            startTimer();
        }

        // تشغيل اللعبة عند التحميل
        window.onload = () => {
            createGrid();
            startTimer();
        };
    </script>
</body>
</html>
