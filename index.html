<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة مسلسلات رمضان</title>
    <style>
        body { background: #0b1120; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; }
        .card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); 
            padding: 25px; border-radius: 20px; border: 1px solid rgba(56, 189, 248, 0.2);
            text-decoration: none; color: #38bdf8; font-weight: bold; font-size: 1.2rem;
            transition: 0.3s; display: block;
        }
        .card:hover { background: #38bdf8; color: #0b1120; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <h1>🌙 مكتبة مسلسلات رمضان</h1>
    <p>شاهد حلقاتك المفضلة فور صدورها</p>

    <div id="seriesList" class="grid">
        </div>

    <script>
        // هذا الكود يقرأ البيانات من ملف اسمه data.json في مستودعك
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('seriesList');
                list.innerHTML = data.map(item => `
                    <a href="${item.url}" class="card" target="_blank">
                        ${item.name}
                    </a>
                `).join('');
            })
            .catch(() => {
                document.getElementById('seriesList').innerHTML = "<p>أضف أول مسلسل في ملف data.json ليبدأ الموقع بالعمل!</p>";
            });
    </script>
</body>
</html>
