<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة مسلسلات رمضان 2026</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(56,189,248,0.2); text-decoration: none; color: #38bdf8; transition: 0.3s; display: block; }
        .card:hover { background: #38bdf8; color: #0f172a; transform: translateY(-5px); }
        h1 { color: #38bdf8; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>🌙 مسلسلات رمضان</h1>
    <p>تحديث تلقائي فور إضافة الحلقات</p>
    <div id="content" class="grid">جاري التحميل...</div>

    <script>
        // كود ذكي لجلب كل الحلقات من المجلد الذي ستنشئه لوحة التحكم
        async function loadData() {
            try {
                const response = await fetch('/index.json'); // Netlify سيقوم بإنشاء هذا الملف
                const data = await response.json();
                const container = document.getElementById('content');
                container.innerHTML = data.episodes.map(ep => `
                    <a href="${ep.link}" class="card" target="_blank">
                        <h3>${ep.title}</h3>
                    </a>
                `).join('');
            } catch (e) {
                document.getElementById('content').innerHTML = "اضف حلقات من لوحة التحكم /admin";
            }
        }
        loadData();

        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) { window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; }); }
            });
        }
    </script>
</body>
</html>
