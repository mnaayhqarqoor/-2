<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حلقات رمضان 2026</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-width: 900px; margin: 30px auto; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: #38bdf8; transition: 0.3s; display: block; }
        .card:hover { background: #38bdf8; color: #0f172a; transform: translateY(-5px); }
        h1 { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
    </style>
</head>
<body>
    <h1>🌙 مسلسلات رمضان</h1>
    <div id="content" class="grid">جاري تحميل الحلقات...</div>

    <script>
        // كود جلب الحلقات من المجلد الذي ستنشئه لوحة التحكم
        async function fetchEpisodes() {
            try {
                // ملاحظة: Decap CMS سيقوم بإنشاء ملفات داخل content/episodes
                // سنقوم بجلبها تلقائياً (تحتاج لإضافة حلقة واحدة أولاً ليعمل الرابط)
                const res = await fetch('/episodes.json'); 
                const data = await res.json();
                const container = document.getElementById('content');
                container.innerHTML = data.map(ep => `
                    <a href="${ep.link}" class="card" target="_blank">
                        <h3>الحلقة ${ep.number}</h3>
                    </a>
                `).join('');
            } catch (e) {
                document.getElementById('content').innerHTML = "لا توجد حلقات حالياً. اضف حلقات من لوحة التحكم /admin";
            }
        }
        fetchEpisodes();

        // كود التوجيه بعد تسجيل الدخول
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
