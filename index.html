<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب عيد الفطر المليون | سجل الآن</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero-section">
        <div class="overlay"></div>
        <div class="content-box">
            <img src="logo.png" alt="شعار المليون" class="main-logo">
            <h1 class="gold-text">برنامج العيد السنوي للسحب</h1>
            <p class="sub-text">سجل الآن لفرصة ربح <span class="prize">$500,000</span></p>
            
            <form id="registrationForm" class="glass-form">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder="الاسم الكامل" required>
                </div>
                <div class="input-group">
                    <input type="tel" id="phoneNumber" placeholder="رقم الهاتف" required>
                </div>
                <button type="submit" id="submitBtn" class="draw-btn">انضم للسحب الآن</button>
            </form>
            <div id="responseMsg"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
